<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VITMEE 2026 — Daily Study Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #161b22;
    --border: #21262d;
    --border2: #30363d;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #f0a830;
    --maths: #f0a830;
    --networks: #3fb950;
    --control: #58a6ff;
    --comms: #bc8cff;
    --em: #ff7b72;
    --revision: #79c0ff;
    --done-bg: #161b22;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(240,168,48,0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(88,166,255,0.03) 0%, transparent 60%),
      linear-gradient(#21262d 1px, transparent 1px),
      linear-gradient(90deg, #21262d 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
    background-position: 0 0, 0 0, -1px -1px, -1px -1px;
  }

  /* ─── HEADER ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,12,15,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 14px 0;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .logo span { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .header-stats {
    display: flex;
    gap: 20px;
    margin-left: auto;
    flex-wrap: wrap;
    align-items: center;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-pill strong { color: var(--text); }
  .countdown-val { color: var(--accent); font-weight: 700; font-size: 15px; }

  /* ─── PROGRESS BAR ─── */
  .progress-section {
    max-width: 1100px;
    margin: 28px auto 0;
    padding: 0 24px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-label span:last-child { color: var(--accent); font-weight: 500; }
  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #ffcc5c);
    border-radius: 10px;
    transition: width 0.4s ease;
  }
  .subject-bars {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .subj-bar {
    flex: 1;
    min-width: 80px;
  }
  .subj-bar-label {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .subj-bar-track {
    height: 4px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .subj-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

  /* ─── FILTERS ─── */
  .filters {
    max-width: 1100px;
    margin: 24px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { color: #0a0c0f; font-weight: 600; }
  .filter-btn .dot { width: 8px; height: 8px; border-radius: 50%; }
  .filter-btn[data-filter="all"].active { background: var(--text); border-color: var(--text); }
  .filter-btn[data-filter="maths"].active { background: var(--maths); border-color: var(--maths); }
  .filter-btn[data-filter="networks"].active { background: var(--networks); border-color: var(--networks); }
  .filter-btn[data-filter="control"].active { background: var(--control); border-color: var(--control); }
  .filter-btn[data-filter="comms"].active { background: var(--comms); border-color: var(--comms); }
  .filter-btn[data-filter="em"].active { background: var(--em); border-color: var(--em); }
  .filter-btn[data-filter="revision"].active { background: var(--revision); border-color: var(--revision); }

  /* ─── DAYS GRID ─── */
  .days-grid {
    max-width: 1100px;
    margin: 24px auto 60px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  /* ─── DAY CARD ─── */
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.3s ease both;
  }
  .day-card:hover {
    transform: translateY(-2px);
    border-color: var(--border2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .day-card.completed {
    opacity: 0.6;
  }
  .day-card.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 32px rgba(240,168,48,0.15);
  }
  .day-card.hidden { display: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .today-badge {
    position: absolute;
    top: 8px;
    right: 10px;
    background: var(--accent);
    color: #000;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.5px;
  }
  .day-number {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    line-height: 1;
    color: var(--muted);
    min-width: 36px;
  }
  .day-card.today .day-number { color: var(--accent); }
  .card-meta { flex: 1; }
  .card-date {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    line-height: 1.3;
    color: var(--text);
  }
  .subj-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .badge-maths { background: rgba(240,168,48,0.15); color: var(--maths); }
  .badge-networks { background: rgba(63,185,80,0.15); color: var(--networks); }
  .badge-control { background: rgba(88,166,255,0.15); color: var(--control); }
  .badge-comms { background: rgba(188,140,255,0.15); color: var(--comms); }
  .badge-em { background: rgba(255,123,114,0.15); color: var(--em); }
  .badge-revision { background: rgba(121,192,255,0.15); color: var(--revision); }

  .card-body { padding: 14px 16px; }

  .topic-list { list-style: none; }
  .topic-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 5px 0;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.1s;
    padding-left: 2px;
    padding-right: 4px;
  }
  .topic-item:hover { background: rgba(255,255,255,0.03); }
  .topic-cb {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: transparent;
  }
  .topic-item.checked .topic-cb {
    border-color: var(--networks);
    background: var(--networks);
  }
  .topic-item.checked .topic-cb::after {
    content: '';
    width: 9px;
    height: 6px;
    border-left: 2px solid #000;
    border-bottom: 2px solid #000;
    transform: rotate(-45deg) translate(1px, -1px);
    display: block;
  }
  .topic-text {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
    flex: 1;
    transition: color 0.15s;
  }
  .topic-item.checked .topic-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--border2);
  }

  /* mini progress in card */
  .card-mini-progress {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mini-bar {
    flex: 1;
    height: 3px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .mini-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--networks);
    transition: width 0.3s;
  }
  .mini-pct {
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    text-align: right;
  }

  /* ─── QUOTE ─── */
  .card-quote {
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--surface2);
    border-left: 2px solid var(--accent);
    border-radius: 0 6px 6px 0;
  }
  .quote-text {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    font-style: italic;
  }
  .quote-author {
    font-size: 10px;
    color: var(--accent);
    margin-top: 4px;
    font-style: normal;
  }
  .day-card[data-subject="maths"] .card-quote { border-left-color: var(--maths); }
  .day-card[data-subject="maths"] .quote-author { color: var(--maths); }
  .day-card[data-subject="networks"] .card-quote { border-left-color: var(--networks); }
  .day-card[data-subject="networks"] .quote-author { color: var(--networks); }
  .day-card[data-subject="control"] .card-quote { border-left-color: var(--control); }
  .day-card[data-subject="control"] .quote-author { color: var(--control); }
  .day-card[data-subject="comms"] .card-quote { border-left-color: var(--comms); }
  .day-card[data-subject="comms"] .quote-author { color: var(--comms); }
  .day-card[data-subject="em"] .card-quote { border-left-color: var(--em); }
  .day-card[data-subject="em"] .quote-author { color: var(--em); }
  .day-card[data-subject="revision"] .card-quote { border-left-color: var(--revision); }
  .day-card[data-subject="revision"] .quote-author { color: var(--revision); }

  /* mark day complete btn */
  .mark-done-btn {
    margin-top: 12px;
    width: 100%;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 7px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mark-done-btn:hover { border-color: var(--networks); color: var(--networks); }
  .day-card.completed .mark-done-btn {
    background: rgba(63,185,80,0.1);
    border-color: var(--networks);
    color: var(--networks);
  }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center;
    padding: 40px 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
  }
  .footer strong { color: var(--accent); }
  .exam-countdown {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--accent);
    display: block;
    margin: 8px 0 4px;
  }

  /* ─── SCROLL TO TODAY ─── */
  .scroll-today {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 10px 16px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(240,168,48,0.3);
    z-index: 200;
    transition: transform 0.15s;
  }
  .scroll-today:hover { transform: scale(1.05); }

  /* responsive */
  @media (max-width: 600px) {
    .days-grid { grid-template-columns: 1fr; }
    .header-stats { gap: 8px; }
    .logo span { display: none; }
  }
</style>
</head>

<button class="scroll-today" onclick="scrollToToday()">↓ Today</button>

// ─────────────────────────────────────────────
//  STORAGE
// ─────────────────────────────────────────────
const STORE_KEY = 'vitmee_checks_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
const todayStr = new Date().toISOString().slice(0,10);

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}

function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

function subjectLabel(s) {
  return {maths:'Eng. Maths', networks:'Networks', control:'Control Sys.', comms:'Comms', em:'Electromagnetics', revision:'Revision'}[s] || s;
}

function subjectColor(s) {
  return {maths:'var(--maths)',networks:'var(--networks)',control:'var(--control)',comms:'var(--comms)',em:'var(--em)',revision:'var(--revision)'}[s] || '#fff';
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render() {
  const state = loadState();
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  let totalTasks = 0, doneTasks = 0;
  const subjectStats = {};

  DAYS.forEach((day, i) => {
    const dayKey = day.date;
    const dayState = state[dayKey] || {};
    const isToday = day.date === todayStr;
    const isPast = day.date < todayStr;
    const dayNum = i + 1;

    // init subject stats
    if (!subjectStats[day.subject]) subjectStats[day.subject] = {total:0,done:0};

    let dayDone = 0;
    day.topics.forEach((_, ti) => {
      totalTasks++;
      subjectStats[day.subject].total++;
      if (dayState[ti]) { doneTasks++; dayDone++; subjectStats[day.subject].done++; }
    });

    const allDone = dayDone === day.topics.length;
    const pct = Math.round((dayDone / day.topics.length) * 100);

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday?' today':'') + (allDone?' completed':'');
    card.dataset.subject = day.subject;
    card.dataset.date = day.date;
    card.id = 'day-' + day.date;
    if (i > 0) card.style.animationDelay = (Math.min(i,20)*0.03)+'s';

    const topicsHTML = day.topics.map((t, ti) => `
      <li class="topic-item${dayState[ti]?' checked':''}" data-day="${dayKey}" data-idx="${ti}">
        <span class="topic-cb"></span>
        <span class="topic-text">${t}</span>
      </li>`).join('');

    card.innerHTML = `
      <div class="card-header">
        ${isToday?'<span class="today-badge">TODAY</span>':''}
        <div class="day-number">${dayNum}</div>
        <div class="card-meta">
          <div class="card-date">${formatDate(day.date)}</div>
          <div class="card-title">${day.title}</div>
        </div>
        <span class="subj-badge badge-${day.subject}">${subjectLabel(day.subject)}</span>
      </div>
      <div class="card-body">
        <ul class="topic-list">${topicsHTML}</ul>
        <div class="card-mini-progress">
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
          <div class="mini-pct">${pct}%</div>
        </div>
        <div class="card-quote">
          <div class="quote-text">"${day.quote.text}"</div>
          <div class="quote-author">— ${day.quote.author}</div>
        </div>
        <button class="mark-done-btn" data-day="${dayKey}">
          ${allDone ? '✓ Day Complete' : '○ Mark Day Complete'}
        </button>
      </div>`;

    grid.appendChild(card);
  });

  // attach events
  grid.querySelectorAll('.topic-item').forEach(el => {
    el.addEventListener('click', () => {
      const state = loadState();
      const d = el.dataset.day, i = parseInt(el.dataset.idx);
      if (!state[d]) state[d] = {};
      state[d][i] = !state[d][i];
      if (!state[d][i]) delete state[d][i];
      saveState(state);
      render();
    });
  });

  grid.querySelectorAll('.mark-done-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const state = loadState();
      const d = btn.dataset.day;
      const day = DAYS.find(x => x.date === d);
      if (!day) return;
      const allDone = day.topics.every((_, ti) => state[d]?.[ti]);
      if (allDone) {
        delete state[d];
      } else {
        state[d] = {};
        day.topics.forEach((_, ti) => { state[d][ti] = true; });
      }
      saveState(state);
      render();
    });
  });

  // update stats
  document.getElementById('tasksDone').textContent = doneTasks;
  document.getElementById('tasksTotal').textContent = totalTasks;

  const overallPct = Math.round((doneTasks / totalTasks) * 100);
  document.getElementById('overallPct').textContent = overallPct + '%';
  document.getElementById('mainBar').style.width = overallPct + '%';

  // subject bars
  const sbEl = document.getElementById('subjectBars');
  sbEl.innerHTML = ['maths','networks','control','comms','em','revision'].map(s => {
    const st = subjectStats[s] || {total:1,done:0};
    const p = Math.round((st.done/st.total)*100);
    return `<div class="subj-bar">
      <div class="subj-bar-label" style="color:${subjectColor(s)}">${subjectLabel(s)}</div>
      <div class="subj-bar-track"><div class="subj-bar-fill" style="width:${p}%;background:${subjectColor(s)}"></div></div>
    </div>`;
  }).join('');

  // countdown
  const examDate = new Date('2026-05-03T00:00:00');
  const now = new Date();
  const diff = Math.max(0, Math.ceil((examDate - now) / 86400000));
  document.getElementById('daysLeft').textContent = diff;
  document.getElementById('footerCountdown').textContent = diff;
  document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'});

  // apply filter
  applyCurrentFilter();
}

// ─────────────────────────────────────────────
//  FILTER
// ─────────────────────────────────────────────
let currentFilter = 'all';

function applyCurrentFilter() {
  document.querySelectorAll('.day-card').forEach(card => {
    if (currentFilter === 'all' || card.dataset.subject === currentFilter) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  applyCurrentFilter();
});

// ─────────────────────────────────────────────
//  SCROLL TO TODAY
// ─────────────────────────────────────────────
function scrollToToday() {
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
  applyCurrentFilter();
  const el = document.getElementById('day-' + todayStr);
  if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
render();
</script>
